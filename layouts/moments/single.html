{{ define "main" }}
<article class="post moment-single">
  <header class="post-header">
    <div class="moment-meta">
      {{ with .Date }}<time class="moment-date" datetime="{{ .Format "2006-01-02T15:04:05Z07:00" }}">{{ .Format "2006.01.02 15:04" }}</time>{{ end }}
      {{ with .Params.mood }}<span class="moment-mood">{{ . }}</span>{{ end }}
    </div>
  </header>

  <div class="prose post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
