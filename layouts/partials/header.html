<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
    <div class="header-right">
      <nav aria-label="主导航">
        <a class="nav-link{{ if .IsHome }} is-active{{ end }}" href="{{ site.Home.RelPermalink }}">首页</a>
        {{ with site.GetPage "tags" }}
          <a class="nav-link{{ if eq $.RelPermalink .RelPermalink }} is-active{{ end }}" href="{{ .RelPermalink }}">标签</a>
        {{ end }}
        {{ with site.GetPage "about" }}
          <a class="nav-link{{ if eq $.RelPermalink .RelPermalink }} is-active{{ end }}" href="{{ .RelPermalink }}">关于</a>
        {{ end }}
      </nav>
      {{ with site.GetPage "search" }}
        <a class="search-btn{{ if eq $.RelPermalink .RelPermalink }} is-active{{ end }}" href="{{ .RelPermalink }}" aria-label="搜索">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3-3"></path></svg>
        </a>
      {{ end }}
    </div>
  </div>
</header>
