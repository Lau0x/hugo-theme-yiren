{{ define "main" }}
<section class="search-page">
  <header class="list-header">
    <h1>{{ .Title | default "搜索" }}</h1>
  </header>
  <label class="search-box">
    <span class="sr-only">搜索关键词</span>
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3-3"></path></svg>
    <input id="search-input" type="search" placeholder="搜索文章" autocomplete="off">
  </label>
  <div id="search-results" class="search-results" data-index="{{ "index.json" | relURL }}"></div>
</section>
{{ end }}
