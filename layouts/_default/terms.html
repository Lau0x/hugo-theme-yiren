{{ define "main" }}
<header class="list-header">
  <h1>{{ .Title }}</h1>
</header>
<ul class="term-list">
  {{ range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.RelPermalink }}">
        <span>{{ .Page.Title }}</span>
        <span>{{ .Count }}</span>
      </a>
    </li>
  {{ end }}
</ul>
{{ end }}
