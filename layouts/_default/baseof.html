<!doctype html>
<html lang="{{ site.Params.lang | default (site.Language.Lang | default "zh-CN") }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <div class="site">
      {{ partial "header.html" . }}
      <main class="container main-content{{ if .IsHome }} home-main{{ end }}">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
    <button type="button" class="back-to-top" aria-label="返回顶部">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>
    {{ $js := resources.Get "js/site.js" | minify | fingerprint }}
    <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
  </body>
</html>
